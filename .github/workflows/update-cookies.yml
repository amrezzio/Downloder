name: "Auto-Update YouTube Cookies"

on:
  schedule:
    - cron: '0 0 * * *'   # هر 24 ساعت یکبار
  workflow_dispatch:

jobs:
  update-secret:
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Setup Python and Playwright"
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: "Generate fresh cookies.txt"
        id: generate
        env:
          EMAIL: ${{ secrets.YT_DUMMY_EMAIL }}
          PASSWORD: ${{ secrets.YT_DUMMY_PASSWORD }}
        run: |
          mkdir -p downloads/logs
          python << 'EOF' 2>&1 | tee downloads/logs/cookie-update.log
          import os, asyncio, time
          from playwright.async_api import async_playwright

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page()
                  try:
                      await page.goto('https://accounts.google.com/signin/v2/identifier?service=youtube&passive=true')
                      await page.fill('input[type="email"]', os.environ['EMAIL'])
                      await page.click('#identifierNext')

                      # انتظار برای حالت‌های مختلف صفحه بعد از کلیک Next
                      # برخی اوقات گوگل مستقیماً فیلد رمز را نشان نمی‌دهد
                      try:
                          # ابتدا منتظر فیلد رمز عبور معمولی
                          await page.wait_for_selector('input[type="password"]', timeout=15000)
                      except:
                          # اگر ظاهر نشد، احتمالاً یک صفحه چالش یا تأیید هویت وجود دارد
                          # سعی می‌کنیم ببینیم آیا صفحه خطایی دارد یا منتظر می‌مانیم
                          print("Password field not found immediately, checking for verification page...")
                          # اگر صفحه‌ای با عنوان "Verify it's you" یا "Too many attempts" دیدیم، خطا می‌دهیم
                          if await page.locator('text=Verifikasi').count() > 0 or await page.locator('text=Too many').count() > 0:
                              raise Exception("Google asks for verification / captcha. Cannot proceed automatically.")
                          # در غیر این صورت کمی بیشتر منتظر می‌مانیم
                          await page.wait_for_timeout(5000)
                          # دوباره تلاش برای فیلد رمز
                          await page.wait_for_selector('input[type="password"]', timeout=15000)

                      await page.fill('input[type="password"]', os.environ['PASSWORD'])
                      await page.click('#passwordNext')

                      # حالا منتظر ماندن برای ورود کامل به یوتیوب
                      await page.wait_for_url('https://www.youtube.com/**', timeout=30000)

                      cookies = await page.context.cookies()
                      with open('cookies.txt', 'w') as f:
                          f.write("# Netscape HTTP Cookie File\n")
                          for cookie in cookies:
                              domain = cookie.get('domain', '.youtube.com')
                              flag = 'TRUE'
                              path = cookie.get('path', '/')
                              secure = 'TRUE' if cookie.get('secure', False) else 'FALSE'
                              expiry = str(int(cookie.get('expires', time.time() + 365*24*3600)))
                              name = cookie.get('name', '')
                              value = cookie.get('value', '')
                              f.write(f"{domain}\t{flag}\t{path}\t{secure}\t{expiry}\t{name}\t{value}\n")
                      print("Success: cookies.txt generated.")
                  except Exception as e:
                      print(f"Error: {e}")
                      raise e
                  finally:
                      await browser.close()

          asyncio.run(main())
          EOF

      - name: "Update YT_COOKIES secret"
        if: success() && hashFiles('cookies.txt') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f cookies.txt ]; then
            BASE64_CONTENT=$(base64 -w0 cookies.txt)
            echo "$BASE64_CONTENT" | gh secret set YT_COOKIES --repo $GITHUB_REPOSITORY
            echo "YT_COOKIES updated successfully."
            rm -f cookies.txt
          else
            echo "Error: cookies.txt was not generated!"
            exit 1
          fi

      - name: "Push error log on failure"
        if: failure()
        run: |
          mkdir -p downloads/logs
          if [ ! -f downloads/logs/cookie-update.log ]; then
            echo "No log generated." > downloads/logs/cookie-update.log
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/logs/cookie-update.log
          git diff --staged --quiet || git commit -m "Cookie update failed – see error log"
          git pull --rebase origin ${{ github.ref }} || true
          git push origin ${{ github.ref }}
