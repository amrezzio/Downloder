name: MHTML - ذخیره صفحه وب با حل خودکار کپچا

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL آدرس صفحه مورد نظر'
        required: true
        type: string
      title:
        description: 'عنوان دلخواه برای فایل خروجی (اختیاری)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 دریافت کدهای مخزن
        uses: actions/checkout@v4

      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 نصب Playwright و وابستگی‌ها
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: 🧠 اجرای اسکریپت دانلود
        run: |
          python save_as_mhtml.py \
            --url "${{ github.event.inputs.url }}" \
            ${{ github.event.inputs.title && format('--title "{0}"', github.event.inputs.title) || '' }}

      - name: 📤 ذخیره فایل در مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          git commit -m "Add MHTML archive for ${{ github.event.inputs.url }}" || echo "تغییری برای ذخیره وجود ندارد"
          git push
