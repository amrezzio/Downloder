name: "Advanced yt-dlp Downloader"

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video/Playlist URL'
        required: true
      simulate:
        description: 'Simulate only (list available formats, no download)'
        type: boolean
        required: false
        default: false
      download_type:
        description: 'Download type'
        required: true
        type: choice
        default: 'video+audio'
        options:
          - 'audio_only'
          - 'video+audio'
      format_code:
        description: 'Custom format code (overrides quality fields if set)'
        required: false
        default: ''
      video_quality:
        description: 'Max video height (leave empty for best)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - '2160p'
          - '1440p'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
      audio_quality:
        description: 'Max audio bitrate (leave empty for best)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - '320k'
          - '256k'
          - '192k'
          - '128k'
          - '96k'
      sub_lang:
        description: 'Subtitle language codes (e.g. en,fa,en,fa or all). Leave empty to skip.'
        required: false
        default: ''
      embed_subs:
        description: 'Embed subtitles into the video (only if subs are downloaded)'
        type: boolean
        required: false
        default: false
      write_thumbnail:
        description: 'Save thumbnail as separate file'
        type: boolean
        required: false
        default: false
      filename_template:
        description: 'Filename template (e.g. %(title)s.%(ext)s)'
        required: false
        default: '%(title)s.%(ext)s'

jobs:
  download:
    runs-on: ubuntu-latest
    outputs:
      download_failed: ${{ steps.download_step.outputs.failed }}
    steps:
      - name: "Install dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg zip
          pip install -q yt-dlp

      # ---------------- SIMULATE MODE ----------------
      - name: "Simulate: List available formats"
        if: ${{ github.event.inputs.simulate == 'true' }}
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.url }}"
          TITLE=$(yt-dlp --print title "$URL" 2>/dev/null || echo "unknown-video")
          SAFE_TITLE=$(echo "$TITLE" | tr -dc '[:alnum:] [:space:]-_' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')
          FOLDER="downloads/${SAFE_TITLE}"
          mkdir -p "$FOLDER"

          set +o pipefail
          yt-dlp -F "$URL" 2>&1 | tee "$FOLDER/formats.txt"
          YT_EXIT=$?
          set -o pipefail

          if [ $YT_EXIT -ne 0 ]; then
            echo "ERROR: yt-dlp could not fetch format list. Possibly invalid URL or restricted content." | tee -a "$FOLDER/formats.txt"
          else
            echo "" >> "$FOLDER/formats.txt"
            echo "Use the IDs from the left column in 'format_code' for your next run." >> "$FOLDER/formats.txt"
          fi

      - name: "Upload simulation output"
        if: ${{ github.event.inputs.simulate == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: simulation-output
          path: downloads/*

      # ---------------- ACTUAL DOWNLOAD MODE ----------------
      - name: "Build format string"
        id: fmt
        if: ${{ github.event.inputs.simulate == 'false' }}
        run: |
          TYPE="${{ github.event.inputs.download_type }}"
          FMT_CODE="${{ github.event.inputs.format_code }}"
          VQ="${{ github.event.inputs.video_quality }}"
          AQ="${{ github.event.inputs.audio_quality }}"

          if [ -n "$FMT_CODE" ]; then
            echo "format=$FMT_CODE" >> $GITHUB_OUTPUT
            exit 0
          fi

          abr_filter() {
            local q="$1"
            if [ -z "$q" ] || [ "$q" = "best" ]; then
              echo "bestaudio/best"
            else
              local num="${q%k}"
              echo "bestaudio[abr<=${num}]/bestaudio/best"
            fi
          }

          if [ "$TYPE" = "audio_only" ]; then
            F=$(abr_filter "$AQ")
          else
            if [ -z "$VQ" ] || [ "$VQ" = "best" ]; then
              VID="bestvideo"
            else
              height="${VQ%p}"
              VID="bestvideo[height<=${height}]"
            fi
            AUD=$(abr_filter "$AQ")
            F="${VID}+${AUD}/${VID}+bestaudio/bestvideo+bestaudio/best"
          fi
          echo "format=${F}" >> $GITHUB_OUTPUT

      - name: "Download with yt-dlp"
        id: download_step
        if: ${{ github.event.inputs.simulate == 'false' }}
        run: |
          mkdir -p downloads

          SUBS_ARGS=""
          if [ -n "${{ github.event.inputs.sub_lang }}" ]; then
            SUBS_ARGS="--write-subs --sub-lang ${{ github.event.inputs.sub_lang }}"
            if [ "${{ github.event.inputs.embed_subs }}" = "true" ]; then
              SUBS_ARGS="$SUBS_ARGS --embed-subs"
            fi
          fi

          THUMB_FLAG=""
          if [ "${{ github.event.inputs.write_thumbnail }}" = "true" ]; then
            THUMB_FLAG="--write-thumbnail"
          fi

          # Download with error capture
          set +o pipefail
          yt-dlp \
            --format "${{ steps.fmt.outputs.format }}" \
            --output "downloads/%(title)s/${{ github.event.inputs.filename_template }}" \
            --add-metadata \
            --geo-bypass \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --merge-output-format mkv \
            $SUBS_ARGS \
            $THUMB_FLAG \
            "${{ github.event.inputs.url }}" 2>&1 | tee downloads/yt-dlp.log
          YT_EXIT=$?
          set -o pipefail

          if [ $YT_EXIT -ne 0 ]; then
            echo "Download failed. Check yt-dlp.log for details." > downloads/download-failed.txt
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

      - name: "Split large files into zip parts"
        if: ${{ github.event.inputs.simulate == 'false' && steps.download_step.outputs.failed != 'true' }}
        run: |
          MAXSIZE_MB=95
          MAXSIZE_BYTES=$((MAXSIZE_MB * 1024 * 1024))

          while IFS= read -r -d '' dir; do
            SIZE=$(du -sb "$dir" | cut -f1)
            if [ "$SIZE" -gt "$MAXSIZE_BYTES" ]; then
              BASE=$(basename "$dir")
              echo "Folder $BASE exceeds ${MAXSIZE_MB} MB, splitting..."
              (cd downloads && zip -r -s ${MAXSIZE_MB}m "${BASE}.zip" "$BASE")
              rm -rf "$dir"
            fi
          done < <(find downloads -mindepth 1 -maxdepth 1 -type d -print0)

      - name: "Upload download output"
        if: ${{ github.event.inputs.simulate == 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-media
          path: downloads/*

      - name: "Fail workflow if download failed"
        if: ${{ github.event.inputs.simulate == 'false' && steps.download_step.outputs.failed == 'true' }}
        run: |
          echo "Download failed. Please check the artifact for error details."
          exit 1
