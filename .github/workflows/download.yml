name: "Advanced yt-dlp Downloader"

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Video/Playlist URL'
        required: true
      simulate:
        description: 'Simulate only (list available formats, no download)'
        type: boolean
        required: false
        default: false
      download_type:
        description: 'Download type'
        required: true
        type: choice
        default: 'video+audio'
        options:
          - 'audio_only'
          - 'video+audio'
      format_code:
        description: 'Custom format code (overrides quality fields if set)'
        required: false
        default: ''
      video_quality:
        description: 'Max video height (leave empty for best)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - '2160p'
          - '1440p'
          - '1080p'
          - '720p'
          - '480p'
          - '360p'
      audio_quality:
        description: 'Max audio bitrate (leave empty for best)'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - '320k'
          - '256k'
          - '192k'
          - '128k'
          - '96k'
      sub_lang:
        description: 'Subtitle language codes (e.g. en,fa,en,fa or all). Leave empty to skip.'
        required: false
        default: ''
      embed_subs:
        description: 'Embed subtitles into the video (only if subs are downloaded)'
        type: boolean
        required: false
        default: false
      write_thumbnail:
        description: 'Save thumbnail as separate file'
        type: boolean
        required: false
        default: false
      filename_template:
        description: 'Filename template (e.g. %(title)s.%(ext)s)'
        required: false
        default: '%(title)s.%(ext)s'

jobs:
  download:
    runs-on: ubuntu-latest
    outputs:
      download_failed: ${{ steps.download_step.outputs.failed }}
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Install dependencies"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg zip unzip curl
          pip install -q "yt-dlp[default]"

          # Install Deno JS runtime (required by yt-dlp for YouTube extraction)
          curl -fsSL https://deno.land/install.sh | DENO_INSTALL=/usr/local sh
          echo "/usr/local/bin" >> $GITHUB_PATH
          deno --version

      # Setup cookies if available
      - name: "Setup cookies"
        if: ${{ secrets.YT_COOKIES != '' }}
        run: |
          echo "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt
          echo "Cookies file created for YouTube authentication."

      # ---------------- SIMULATE MODE ----------------
      - name: "Simulate: List available formats"
        if: ${{ github.event.inputs.simulate == 'true' }}
        run: |
          mkdir -p downloads
          URL="${{ github.event.inputs.url }}"

          # Extract video ID for folder naming if title fails
          VIDEO_ID=$(echo "$URL" | grep -oP '(?:v=|/)([a-zA-Z0-9_-]{11})' | head -1)
          if [ -z "$VIDEO_ID" ]; then
            VIDEO_ID="unknown-video"
          fi

          # Build cookies argument
          COOKIES_ARG=""
          [ -f cookies.txt ] && COOKIES_ARG="--cookies cookies.txt"

          # Try to get title safely
          set +o pipefail
          TITLE=$(yt-dlp --print title $COOKIES_ARG "$URL" 2>/dev/null || echo "")
          YT_EXIT=$?
          set -o pipefail

          # Use video ID if title extraction failed
          if [ -z "$TITLE" ] || [ $YT_EXIT -ne 0 ]; then
            SAFE_TITLE="$VIDEO_ID"
          else
            SAFE_TITLE=$(echo "$TITLE" | tr -dc '[:alnum:] [:space:]-_' | sed 's/  */ /g' | sed 's/^ *//;s/ *$//')
          fi

          FOLDER="downloads/${SAFE_TITLE}"
          mkdir -p "$FOLDER"

          set +o pipefail
          yt-dlp -F $COOKIES_ARG "$URL" 2>&1 | tee "$FOLDER/formats.txt"
          YT_EXIT=$?
          set -o pipefail

          if [ $YT_EXIT -ne 0 ]; then
            echo "ERROR: yt-dlp could not fetch format list. Possibly invalid URL or restricted content." | tee -a "$FOLDER/formats.txt"
          else
            echo "" >> "$FOLDER/formats.txt"
            echo "Use the IDs from the left column in 'format_code' for your next run." >> "$FOLDER/formats.txt"
          fi

          # Push simulation results to repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Simulation: format list for $SAFE_TITLE"
          git pull --rebase origin ${{ github.ref }} || true
          git push origin ${{ github.ref }}

      # ---------------- ACTUAL DOWNLOAD MODE ----------------
      - name: "Build format string"
        id: fmt
        if: ${{ github.event.inputs.simulate == 'false' }}
        run: |
          TYPE="${{ github.event.inputs.download_type }}"
          FMT_CODE="${{ github.event.inputs.format_code }}"
          VQ="${{ github.event.inputs.video_quality }}"
          AQ="${{ github.event.inputs.audio_quality }}"

          if [ -n "$FMT_CODE" ]; then
            echo "format=$FMT_CODE" >> $GITHUB_OUTPUT
            exit 0
          fi

          abr_filter() {
            local q="$1"
            if [ -z "$q" ] || [ "$q" = "best" ]; then
              echo "bestaudio/best"
            else
              local num="${q%k}"
              echo "bestaudio[abr<=${num}]/bestaudio/best"
            fi
          }

          if [ "$TYPE" = "audio_only" ]; then
            F=$(abr_filter "$AQ")
          else
            if [ -z "$VQ" ] || [ "$VQ" = "best" ]; then
              VID="bestvideo"
            else
              height="${VQ%p}"
              VID="bestvideo[height<=${height}]"
            fi
            AUD=$(abr_filter "$AQ")
            F="${VID}+${AUD}/${VID}+bestaudio/bestvideo+bestaudio/best"
          fi
          echo "format=${F}" >> $GITHUB_OUTPUT

      - name: "Download with yt-dlp"
        id: download_step
        if: ${{ github.event.inputs.simulate == 'false' }}
        run: |
          mkdir -p downloads

          URL="${{ github.event.inputs.url }}"

          # Build cookies argument
          COOKIES_ARG=""
          [ -f cookies.txt ] && COOKIES_ARG="--cookies cookies.txt"

          SUBS_ARGS=""
          if [ -n "${{ github.event.inputs.sub_lang }}" ]; then
            SUBS_ARGS="--write-subs --sub-lang ${{ github.event.inputs.sub_lang }}"
            if [ "${{ github.event.inputs.embed_subs }}" = "true" ]; then
              SUBS_ARGS="$SUBS_ARGS --embed-subs"
            fi
          fi

          THUMB_FLAG=""
          if [ "${{ github.event.inputs.write_thumbnail }}" = "true" ]; then
            THUMB_FLAG="--write-thumbnail"
          fi

          set +o pipefail
          yt-dlp \
            --format "${{ steps.fmt.outputs.format }}" \
            --output "downloads/%(title)s/${{ github.event.inputs.filename_template }}" \
            --add-metadata \
            --geo-bypass \
            --user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            --merge-output-format mkv \
            $COOKIES_ARG \
            $SUBS_ARGS \
            $THUMB_FLAG \
            "$URL" 2>&1 | tee downloads/yt-dlp.log
          YT_EXIT=$?
          set -o pipefail

          # Extract video ID for folder naming
          VIDEO_ID=$(echo "$URL" | grep -oP '(?:v=|/)([a-zA-Z0-9_-]{11})' | head -1)
          if [ -z "$VIDEO_ID" ]; then
            VIDEO_ID="unknown-video"
          fi

          if [ $YT_EXIT -ne 0 ]; then
            echo "Download failed. Check yt-dlp.log for details." > downloads/download-failed.txt
            echo "failed=true" >> $GITHUB_OUTPUT
          else
            echo "failed=false" >> $GITHUB_OUTPUT
          fi

          # Move log into a dedicated folder
          VIDEO_FOLDER=$(find downloads -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$VIDEO_FOLDER" ]; then
            # No folder created by yt-dlp (e.g., title extraction failed), create one with video ID
            VIDEO_FOLDER="downloads/${VIDEO_ID}"
            mkdir -p "$VIDEO_FOLDER"
          fi
          mv -f downloads/yt-dlp.log "$VIDEO_FOLDER/" 2>/dev/null
          [ -f downloads/download-failed.txt ] && mv downloads/download-failed.txt "$VIDEO_FOLDER/"

      - name: "Compress large main file only"
        if: ${{ github.event.inputs.simulate == 'false' && steps.download_step.outputs.failed != 'true' }}
        run: |
          MAXSIZE_MB=95
          MAXSIZE_BYTES=$((MAXSIZE_MB * 1024 * 1024))

          VIDEO_FOLDER=$(find downloads -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$VIDEO_FOLDER" ]; then exit 0; fi

          MAIN_FILE=$(find "$VIDEO_FOLDER" -type f \( -iname "*.mkv" -o -iname "*.mp4" -o -iname "*.webm" -o -iname "*.m4a" -o -iname "*.opus" -o -iname "*.mp3" \) -print0 | xargs -0 ls -S | head -1)
          if [ -z "$MAIN_FILE" ]; then exit 0; fi

          SIZE=$(stat -c%s "$MAIN_FILE")
          if [ "$SIZE" -gt "$MAXSIZE_BYTES" ]; then
            echo "Main file exceeds ${MAXSIZE_MB} MB, compressing..."
            BASENAME=$(basename "$MAIN_FILE")
            ZIPNAME="${BASENAME}.zip"
            (cd "$VIDEO_FOLDER" && zip "$ZIPNAME" "$BASENAME" && rm "$BASENAME")
          fi

      - name: "Commit and push to repository"
        if: ${{ github.event.inputs.simulate == 'false' && steps.download_step.outputs.failed != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Download completed: new media in downloads/"
          git pull --rebase origin ${{ github.ref }} || true
          git push origin ${{ github.ref }}

      - name: "Push failure logs if download failed"
        if: ${{ github.event.inputs.simulate == 'false' && steps.download_step.outputs.failed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git diff --staged --quiet || git commit -m "Download failed – see logs in downloads/"
          git pull --rebase origin ${{ github.ref }} || true
          git push origin ${{ github.ref }}
          exit 1
