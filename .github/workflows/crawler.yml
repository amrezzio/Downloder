name: Crawl Website and Download as MHTML

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Starting URL'
        required: true
        type: string
      max_pages:
        description: 'Maximum number of pages to download (default 50)'
        required: false
        type: number
        default: 50

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 📦 Install Playwright and dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: 🕷️ Run crawler
        run: |
          python crawl_mhtml.py \
            --url "${{ github.event.inputs.url }}" \
            --max ${{ github.event.inputs.max_pages }}

      - name: 📤 Commit and push downloaded pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add download/
          git commit -m "Crawled ${{ github.event.inputs.url }} (max ${{ github.event.inputs.max_pages }} pages)" || echo "No changes to commit"
          git push
